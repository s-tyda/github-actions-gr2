name: Run tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Perform tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout repo
      - uses: actions/setup-python@v5
        name: Install Python
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        name: Install dependencies
      - run: pytest -q
        name: Run pytest
